name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  python:
    name: Python — lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check triage.py tests/

      - name: Format check (ruff)
        run: ruff format --check triage.py tests/

      - name: Compile
        run: python -m py_compile triage.py

      - name: Tests (pytest)
        env:
          ANTHROPIC_API_KEY: dummy-key-for-tests
        run: pytest -ra

      - name: Confirm example fixtures present
        run: |
          test -f examples/new_client.txt
          test -f examples/complaint.txt
          test -f examples/gibberish.txt
          echo "All example fixtures present."

  web:
    name: Web — lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate web assets
        run: |
          test -f web/index.html
          test -f web/style.css
          test -f web/app.js
          test -f web/triage-core.js
          test -f web/triage-core.test.mjs
          # Lock-step guard: if the JS prompt drifts from the Python prompt, this fails.
          grep -q "claude-sonnet-4-5" web/triage-core.js
          grep -q "spam_or_unclear" web/triage-core.js
          grep -q "Never invent facts" web/triage-core.js
          echo "Web assets present and consistent."

      - name: Tests (node --test)
        run: node --test web/triage-core.test.mjs

      - name: Build Pages artifact
        run: |
          mkdir -p _site
          cp -r web/* _site/
          # Drop the test file from the deployed artifact.
          rm -f _site/triage-core.test.mjs
          ls -la _site/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy demo to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [python, web]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
